version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: onboardme-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onboardme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onboardme-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: onboardme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLIENT_NAME: ${CLIENT_NAME}
      COMMUNITY_NAME: ${COMMUNITY_NAME}
      COMMUNITY_DESCRIPTION: ${COMMUNITY_DESCRIPTION}
      INVITE_LINK: ${INVITE_LINK}
      AGENT_NAME: ${AGENT_NAME}
      AGENT_TONE: ${AGENT_TONE}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      CALENDLY_LINK: ${CALENDLY_LINK}
      FOUNDER_STORIES_LINK: ${FOUNDER_STORIES_LINK}
      OPERATOR_SESSION_LINK: ${OPERATOR_SESSION_LINK}
      FOLLOW_UP_DELAY_MINS: 30
      ABANDON_AFTER_HOURS: 24
      NUDGE_DELAY_MINS: 30
      TIMEOUT_HOURS: 24
      ENGAGEMENT_THRESHOLD: 0.3
      ENGAGEMENT_DAYS: 14
      WHATSAPP_BRIDGE_URL: http://whatsapp-bridge:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3

  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: onboardme-whatsapp-bridge
    environment:
      BAILEYS_SESSION_PATH: /sessions
      API_URL: http://api:8000
      PORT: 3000
    volumes:
      - whatsapp_sessions:/sessions
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  whatsapp_sessions:
